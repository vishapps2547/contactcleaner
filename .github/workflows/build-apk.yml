name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log

      - name: Find generated APKs
        run: find android -name "*.apk" -o -name "*.aab" 2>&1 | tee /tmp/apks.txt

      - name: Post error log on failure
        if: failure()
        run: |
          BODY=$(tail -c 60000 /tmp/build.log | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -d "{\"body\": $BODY}"

      - name: Post APK paths always
        if: always()
        run: |
          BODY=$(cat /tmp/apks.txt | python3 -c "import json,sys; print(json.dumps('APK/AAB paths found:\n' + sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -d "{\"body\": $BODY}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contact-cleaner-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
